<!DOCTYPE html>
<html>
<head>
    <title>AI Education Platform</title>
</head>
<body>
    <h2>Plataforma Educacional com IA</h2>

    <form id="form-gerador" method="POST">
        <label>Aluno:</label>
        <select name="student">
            {% for s in students %}
                <option value="{{ loop.index0 }}">{{ s.nome }} ({{ s.nivel }})</option>
            {% endfor %}
        </select>

        <br><br>

        <label>Tópico:</label>
        <input type="text" name="topic" required>

        <br><br>

        <label>Tipo de Conteúdo:</label>
        <select name="content_type">
            <option value="explicacao">Explicação</option>
            <option value="exemplos">Exemplos</option>
            <option value="reflexao">Reflexão</option>
            <option value="resumo_visual">Resumo Visual</option>
        </select>

        <br><br>

        <label>Versão do Prompt:</label>
        <select name="version">
            <option value="v1">v1 Prompt Básico</option>
            <option value="v2">v2 Prompt Otimizado</option>
        </select>

        <br><br>

        <button type="submit" id="botao-gerar">Gerar</button>
    </form>

    <hr>

    {% if result %}
        <h3>Resultado:</h3>
        <pre>{{ result }}</pre>
    {% endif %}

    <script>
        document.getElementById('form-gerador').addEventListener('submit', function() {
            var botao = document.getElementById('botao-gerar');
            botao.innerHTML = 'Gerando conteúdo, aguarde...';
            botao.disabled = true;
            botao.style.opacity = '0.7';
            botao.style.cursor = 'not-allowed';
        });
    </script>
</body>
</html>
